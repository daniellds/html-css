<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1 {
        background-color: lightgray;

        height: 300px;
        width: 300px;

        border: 10px solid darkslategray;

        padding: 10px;

        margin: 20px auto 40px auto;

        outline: 5px dashed salmon;
       
        /*Tudo com Shorthands. H1-box-level; a-inline-level*/

        a{
            border: 10px solid red;
            padding: 10px;
        }

    }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Parágrafos também são exemplos de Box-Level, mas os <a href="#">são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
