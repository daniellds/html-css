<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de tabela de notas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border-collapse: collapse;
        }
        th, td{
            width: 200px;
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
        .cab{
            background-color: gray;
            color: white;
        }
        #m{
            text-align: left;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th scope="col" rowspan="2" class="cab">Área</th>
                <th scope="colgroup" rowspan="2" class="cab">Disciplina</th>
                <th scope="colgroup" colspan="2" class="cab">Notas</th>
                <th scope="colgroup" rowspan="2" class="cab">Média</th>
            </tr>
            <tr>
                <th scope="colgroup" class="cab">Nota 1</th>
                <th scope="colgroup" class="cab">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
             <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
             <tr>
                <td>Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
             <tr>

                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="cab" id="m">Média de Exatas</th>
                <td class="cab" >0.0</td>
            </tr>
             <tr>
                <th scope="rowgroup" rowspan="2">Humanas</th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="cab" id="m">Média de Humanas</th>
                <td class="cab
                ">0.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
